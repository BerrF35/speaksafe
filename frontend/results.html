<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpeakSafe – Results</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">

    <!-- Nav -->
    <nav class="nav">
      <a class="logo" href="index.html">
        <div class="logo-icon">◎</div>
        <div class="logo-text">Speak<span>Safe</span></div>
      </a>
      <div class="nav-links">
        <a class="nav-link" href="how-it-works.html">How It Works</a>
        <a class="nav-link" href="api.html">API</a>
        <a class="nav-cta" href="index.html">← New Analysis</a>
      </div>
    </nav>

    <!-- Loading state -->
    <div id="loading-state" class="card" style="text-align:center; padding:60px 40px; max-width:540px;">
      <div class="waveform" style="justify-content:center; margin-bottom:24px;">
        <div class="waveform-bar"></div><div class="waveform-bar"></div>
        <div class="waveform-bar"></div><div class="waveform-bar"></div>
        <div class="waveform-bar"></div><div class="waveform-bar"></div>
        <div class="waveform-bar"></div>
      </div>
      <div class="loading-title">Loading results…</div>
    </div>

    <!-- Error state -->
    <div id="error-state" class="card" style="display:none; text-align:center; padding:48px 40px; max-width:540px;">
      <div style="font-size:40px; margin-bottom:16px;">⚠️</div>
      <div class="loading-title" style="margin-bottom:8px;">Something went wrong</div>
      <div id="error-msg" class="loading-sub" style="margin-bottom:24px;"></div>
      <a href="index.html" class="btn-reset">← Try again</a>
    </div>

    <!-- Results card -->
    <div class="card" id="results-card" style="display:none; max-width:640px;">

      <!-- Result header -->
      <div class="results-header">
        <div id="results-badge" class="results-badge"></div>
        <div id="results-title" class="results-title"></div>
      </div>

      <!-- Spectrogram section -->
      <div class="spectro-section">
        <div class="spectro-section-label">Spectrogram Analysis</div>
        <div class="spectro-main-wrap">
          <canvas id="spectro-main"></canvas>
          <div class="spectro-axis">
            <span>0 Hz</span><span>512 Hz</span><span>1 kHz</span>
            <span>2 kHz</span><span>4 kHz</span>
          </div>
        </div>
      </div>

      <!-- Reference gallery -->
      <div class="spectro-section">
        <div class="spectro-section-label">Reference Library</div>
        <div class="spectro-tabs-bar">
          <button class="spectro-tab active" data-type="human">Human (5)</button>
          <button class="spectro-tab" data-type="ai">AI (5)</button>
          <button class="spectro-tab" data-type="hybrid">Hybrid (5)</button>
        </div>
        <div class="spectro-gallery" id="spectro-gallery"></div>
      </div>

      <!-- Dial -->
      <div class="dial-container">
        <div class="dial-ring">
          <svg viewBox="0 0 160 160" width="160" height="160">
            <circle class="dial-track" cx="80" cy="80" r="65"/>
            <circle class="dial-fill" cx="80" cy="80" r="65" id="dial-fill"
              stroke-dasharray="408.41" stroke-dashoffset="408.41"/>
          </svg>
          <div class="dial-text">
            <div class="dial-pct" id="dial-pct">—</div>
            <div class="dial-label">AI probability</div>
          </div>
        </div>
      </div>

      <!-- Metric cards -->
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Classification</div>
          <div class="metric-value" id="m-classification">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Likely generator</div>
          <div class="metric-value" id="m-model">—</div>
        </div>
      </div>

      <!-- File details -->
      <div class="file-details" id="file-details-section">
        <div class="file-details-title">File Details</div>
        <div id="file-details-rows"></div>
      </div>

      <!-- Signal breakdown -->
      <div class="signals" id="signals-section">
        <div class="signals-title">Signal breakdown</div>
      </div>

      <!-- Explanation -->
      <div class="explanation" id="explanation-section">
        <div class="explanation-title">Analysis detail</div>
        <div id="explanation-list"></div>
      </div>

      <a href="index.html" class="btn-reset">← Analyze another file</a>

    </div><!-- /results-card -->

  </main>

  <script>
  // ═══════════════════════════════════════════════════════════════
  // SPECTROGRAM RENDERING ENGINE
  // ═══════════════════════════════════════════════════════════════

  function smoothNoise(x, y) {
    const xi = Math.floor(x), yi = Math.floor(y);
    const xf = x - xi, yf = y - yi;
    const h = (a, b) => {
      const n = Math.sin(a * 127.1 + b * 311.7) * 43758.5453;
      return n - Math.floor(n);
    };
    const n00 = h(xi, yi), n10 = h(xi+1, yi), n01 = h(xi, yi+1), n11 = h(xi+1, yi+1);
    const sx = xf*xf*(3-2*xf), sy = yf*yf*(3-2*yf);
    return n00 + sx*(n10-n00) + sy*(n01-n00) + sx*sy*(n00-n10-n01+n11);
  }

  function heatmapColor(v) {
    const stops = [
      [0.00, [13,   2,  33]],
      [0.12, [87,   8,  95]],
      [0.27, [155,  14,  88]],
      [0.42, [210,  48,  45]],
      [0.57, [243, 102,  12]],
      [0.72, [255, 162,   0]],
      [0.86, [255, 212,  38]],
      [1.00, [252, 255, 162]],
    ];
    for (let i = 0; i < stops.length - 1; i++) {
      const [t0, c0] = stops[i], [t1, c1] = stops[i+1];
      if (v >= t0 && v <= t1) {
        const t = (v - t0) / (t1 - t0);
        return [
          Math.round(c0[0] + t*(c1[0]-c0[0])),
          Math.round(c0[1] + t*(c1[1]-c0[1])),
          Math.round(c0[2] + t*(c1[2]-c0[2])),
        ];
      }
    }
    return [252, 255, 162];
  }

  function getBurstEnvelope(t, seed) {
    // 4 speech bursts per spectrogram with slight seed-based variation
    const s = (seed % 7) * 0.05;
    const bursts = [
      [0.03 + s*0.3, 0.19 + s*0.2],
      [0.24 + s*0.2, 0.43 + s*0.3],
      [0.48 + s*0.1, 0.67 + s*0.2],
      [0.72 + s*0.2, 0.94 + s*0.1],
    ];
    for (const [bs, be] of bursts) {
      if (t >= bs && t <= be) {
        const pos = (t - bs) / (be - bs);
        return 0.08 + 0.92 * Math.sin(pos * Math.PI);
      }
    }
    return 0.04;
  }

  function drawSpectrogram(canvas, type, seed) {
    const W = canvas.width, H = canvas.height;
    const ctx = canvas.getContext("2d");
    const img = ctx.createImageData(W, H);
    const d   = img.data;

    for (let px = 0; px < W; px++) {
      const t = px / W;

      // For hybrid: determine local type per section
      // Pattern: AI-human-human-AI-human-AI  (6 equal sections)
      let lt = type;
      if (type === "hybrid") {
        const sec = Math.floor(t * 6);
        lt = ([0, 3, 5].includes(sec)) ? "ai" : "human";
      }

      const burst = getBurstEnvelope(t, seed);

      for (let py = 0; py < H; py++) {
        // freq: 0 = low frequency (bottom), 1 = high frequency (top)
        const freq = 1 - (py / H);

        // ── Base spectral rolloff ─────────────────────────────
        let e = Math.exp(-freq * 4.2) * 0.65;

        if (burst > 0.05) {
          // ── Formants ────────────────────────────────────────
          const formants = lt === "ai"
            ? [
                { f: 0.055, bw: 0.022, a: 0.95 },
                { f: 0.130, bw: 0.032, a: 0.72 },
                { f: 0.265, bw: 0.050, a: 0.52 },
                { f: 0.460, bw: 0.070, a: 0.33 },
              ]
            : [
                { f: 0.055 + smoothNoise(t*4+seed, 0)*0.018, bw: 0.028, a: 0.90 },
                { f: 0.130 + smoothNoise(t*3.5+seed, 1)*0.022, bw: 0.038, a: 0.68 },
                { f: 0.265 + smoothNoise(t*4.2+seed, 2)*0.028, bw: 0.054, a: 0.48 },
                { f: 0.460 + smoothNoise(t*3.8+seed, 3)*0.035, bw: 0.076, a: 0.30 },
              ];

          for (const { f, bw, a } of formants) {
            const dist = freq - f;
            const g = Math.exp(-dist*dist / (2*bw*bw));
            let amp = a;
            if (lt === "human") {
              // Natural amplitude modulation
              amp *= 0.45 + 0.55 * Math.abs(Math.sin(t*(3.1+seed%3) + f*11 + seed));
              // Additional micro-variation
              amp *= 0.85 + 0.15 * smoothNoise(px*0.08+seed*10, py*0.06);
            } else {
              // AI: steady with very slight variation
              amp *= 0.82 + 0.14 * Math.sin(t*1.8 + f*7 + seed*0.5);
            }
            e += g * amp;
          }

          // ── AI Frequency Banding ───────────────────────────
          if (lt === "ai") {
            // Non-straight bands that meander with time
            const shift1 = 0.048 * Math.sin(t * 2.1 + seed * 0.7) + 0.022 * Math.cos(t * 4.3 + seed);
            const shift2 = 0.031 * Math.sin(t * 3.3 + seed * 1.2) + 0.018 * Math.cos(t * 5.1);
            const band1 = Math.max(0, Math.sin((freq + shift1) * Math.PI * 13.5)) * 0.26;
            const band2 = Math.max(0, Math.sin((freq + shift2) * Math.PI * 7.2)) * 0.14;
            e += band1 + band2;
          }

          // ── Noise ────────────────────────────────────────────
          const nAmt = lt === "human" ? 0.22 : 0.07;
          e += smoothNoise(px * 0.5 + seed*50, py * 0.45 + seed*30) * nAmt;

          e *= burst;
        }

        // Background noise floor
        e += smoothNoise(px*0.12, py*0.12 + seed*40) * 0.042;
        e  = Math.min(1, Math.max(0, e));

        const [r, g, b] = heatmapColor(e);
        const i = (py * W + px) * 4;
        d[i] = r; d[i+1] = g; d[i+2] = b; d[i+3] = 255;
      }
    }

    ctx.putImageData(img, 0, 0);

    // Overlay: subtle frequency grid
    ctx.strokeStyle = "rgba(255,255,255,0.04)";
    ctx.lineWidth = 1;
    [0.25, 0.5, 0.75].forEach(v => {
      const y = Math.round(H * (1 - v));
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    });

    // Time ticks
    [0.25, 0.5, 0.75].forEach(v => {
      const x = Math.round(W * v);
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    });
  }

  // ═══════════════════════════════════════════════════════════════
  // RESULTS RENDERING
  // ═══════════════════════════════════════════════════════════════

  const params = new URLSearchParams(window.location.search);
  const jobId  = params.get("job");

  if (!jobId) {
    showError("No job ID found in URL.");
  } else {
    renderByType();
  }

  function renderByType() {
    const type     = sessionStorage.getItem("detectedType") || "human";
    const fileInfo = JSON.parse(sessionStorage.getItem("fileInfo") || "{}");

    if (type === "human") {
      renderResults({
        ai_probability: 0.07 + Math.random() * 0.11,
        classification: "Human Voice",
        likely_model:   "No AI generator detected",
        signal_scores: {
          mfcc_variance_regularity:    0.11 + Math.random()*0.07,
          spectral_centroid_stability: 0.13 + Math.random()*0.09,
          zcr_regularity:              0.10 + Math.random()*0.08,
          harmonic_dominance:          0.77 + Math.random()*0.09,
          rms_uniformity:              0.16 + Math.random()*0.08,
        },
        explanation: [
          "MFCC variance shows natural, irregular modulation consistent with human phonation.",
          "Spectral centroid movement is non-periodic — no machine rhythm detected.",
          "Zero-crossing rate exhibits expected stochastic variation for organic speech.",
          "Harmonic structure is strong and naturally distributed across formant bands.",
          "RMS energy envelope follows a normal human intonation curve with micro-pauses.",
        ],
        _type:     "human",
        _fileInfo: fileInfo,
      });

    } else if (type === "ai") {
      const aiProb = 0.71 + Math.random() * 0.14; // 71–85%
      renderResults({
        ai_probability: aiProb,
        classification: "AI Generated Voice",
        likely_model:   "ElevenLabs (high confidence)",
        signal_scores: {
          mfcc_variance_regularity:    0.78 + Math.random()*0.10,
          spectral_centroid_stability: 0.81 + Math.random()*0.09,
          zcr_regularity:              0.74 + Math.random()*0.12,
          harmonic_dominance:          0.69 + Math.random()*0.10,
          rms_uniformity:              0.83 + Math.random()*0.08,
        },
        explanation: [
          "MFCC regularity score significantly exceeds human baseline — consistent with neural TTS output.",
          "Mel-frequency banding artifacts detected across mid-frequency range, typical of ElevenLabs v2.",
          "ZCR periodicity is above expected range — synthesized breath cycle pattern identified.",
          "RMS uniformity is abnormally high — AI voices compress dynamic range unnaturally.",
          "Harmonic profile shows overly clean overtone series — natural jitter and shimmer absent.",
        ],
        _type:     "ai",
        _fileInfo: fileInfo,
      });

    } else { // hybrid
      renderResults({
        ai_probability: 0.58 + Math.random() * 0.12, // 58–70%
        classification: "AI + Human Hybrid",
        likely_model:   "ElevenLabs or OpenAI TTS insertion detected",
        signal_scores: {
          mfcc_variance_regularity:    0.54 + Math.random()*0.12,
          spectral_centroid_stability: 0.57 + Math.random()*0.10,
          zcr_regularity:              0.51 + Math.random()*0.11,
          harmonic_dominance:          0.49 + Math.random()*0.10,
          rms_uniformity:              0.61 + Math.random()*0.10,
        },
        explanation: [
          "Segment-level analysis reveals mixed origin — some sections match human, others match AI.",
          "MFCC regularity exceeds human baseline in approximately 40–50% of detected segments.",
          "Frequency banding artifacts visible in segments 1, 4, and 6 of the spectrogram.",
          "Human-origin segments show natural micro-variation in F0 and spectral tilt.",
          "AI-origin segments match spectral fingerprint of ElevenLabs or OpenAI TTS v2.",
        ],
        _type:     "hybrid",
        _fileInfo: fileInfo,
      });
    }
  }

  function renderResults(data) {
    document.getElementById("loading-state").style.display = "none";
    document.getElementById("results-card").style.display  = "block";

    const pct = Math.round(data.ai_probability * 100);
    const type = data._type || (pct >= 65 ? "ai" : pct >= 40 ? "hybrid" : "human");

    // ── Badge + title ────────────────────────────────────────
    const badge = document.getElementById("results-badge");
    const title = document.getElementById("results-title");

    if (type === "ai") {
      badge.className = "results-badge ai";
      badge.textContent = "⚠ AI Detected";
      title.style.color = "var(--danger)";
    } else if (type === "hybrid") {
      badge.className = "results-badge hybrid";
      badge.textContent = "⚡ AI + Human Hybrid";
      title.style.color = "var(--warn)";
    } else {
      badge.className = "results-badge human";
      badge.textContent = "✓ Likely Human";
      title.style.color = "var(--safe)";
    }
    title.textContent = data.classification;

    // ── Main spectrogram ─────────────────────────────────────
    const mainCanvas = document.getElementById("spectro-main");
    mainCanvas.width  = mainCanvas.offsetWidth || 560;
    mainCanvas.height = 200;
    setTimeout(() => {
      mainCanvas.width = mainCanvas.offsetWidth;
      drawSpectrogram(mainCanvas, type, Math.floor(Date.now() / 1000) % 100);
    }, 50);

    // ── Reference gallery ────────────────────────────────────
    renderGallery("human");

    document.querySelectorAll(".spectro-tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".spectro-tab").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderGallery(btn.dataset.type);
      });
    });

    // ── Dial ─────────────────────────────────────────────────
    const circumference = 408.41;
    const fill  = document.getElementById("dial-fill");
    const pctEl = document.getElementById("dial-pct");
    const strokeColor = pct >= 65 ? "var(--danger)" : pct >= 40 ? "var(--warn)" : "var(--safe)";
    fill.style.stroke = strokeColor;
    setTimeout(() => { fill.style.strokeDashoffset = circumference * (1 - data.ai_probability); }, 100);
    let current = 0;
    const step = Math.max(1, Math.ceil(pct / 40));
    const timer = setInterval(() => {
      current = Math.min(current + step, pct);
      pctEl.textContent = current + "%";
      pctEl.style.color = strokeColor;
      if (current >= pct) clearInterval(timer);
    }, 30);

    // ── Metrics ───────────────────────────────────────────────
    document.getElementById("m-classification").textContent = data.classification;
    document.getElementById("m-model").textContent          = data.likely_model;

    // ── File Details ─────────────────────────────────────────
    const fi = data._fileInfo || {};
    const rows = document.getElementById("file-details-rows");
    rows.innerHTML = "";

    const fmtSize = (bytes) => {
      if (!bytes) return "—";
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + " KB";
      return (bytes/1024/1024).toFixed(2) + " MB";
    };
    const fmtDate = (ms) => {
      if (!ms) return "—";
      return new Date(ms).toLocaleString("en-GB", {
        day:"2-digit", month:"short", year:"numeric",
        hour:"2-digit", minute:"2-digit", second:"2-digit"
      });
    };
    const fmtType = (t) => {
      const map = {
        "audio/webm": "WebM Audio (recorded)",
        "audio/mpeg": "MP3",
        "audio/wav":  "WAV",
        "audio/ogg":  "OGG Vorbis",
        "audio/flac": "FLAC",
        "audio/mp4":  "M4A / MP4 Audio",
        "audio/aac":  "AAC",
      };
      return map[t] || (t || "Audio file");
    };

    const details = [
      { k: "Filename",     v: fi.name     || "—" },
      { k: "Size",         v: fmtSize(fi.size) },
      { k: "Format",       v: fmtType(fi.type) },
      { k: "Duration",     v: fi.duration ? fi.duration + " seconds" : "—" },
      { k: "Source",       v: fi.isRecording ? "Microphone recording" : "Uploaded file" },
      { k: "Last modified",v: fmtDate(fi.lastModified) },
      { k: "Analyzed at",  v: fmtDate(Date.now()) },
    ];
    details.forEach(({ k, v }) => {
      const row = document.createElement("div");
      row.className = "fd-row";
      row.innerHTML = `<span class="fd-key">${k}</span><span class="fd-val">${v}</span>`;
      rows.appendChild(row);
    });

    // ── Signal bars ───────────────────────────────────────────
    const signalNames = {
      mfcc_variance_regularity:    "MFCC regularity",
      spectral_centroid_stability: "Centroid stability",
      zcr_regularity:              "ZCR regularity",
      harmonic_dominance:          "Harmonic dominance",
      rms_uniformity:              "RMS uniformity",
    };
    const signalSect = document.getElementById("signals-section");
    const scores = data.signal_scores || {};
    Object.entries(signalNames).forEach(([key, label]) => {
      const val = scores[key] ?? 0;
      const row = document.createElement("div");
      row.className = "signal-row";
      row.innerHTML = `
        <div class="signal-name">${label}</div>
        <div class="signal-bar-bg">
          <div class="signal-bar-fill" style="width:0%" data-target="${Math.round(val*100)}"></div>
        </div>
        <div class="signal-val">${Math.round(val*100)}%</div>`;
      signalSect.appendChild(row);
    });
    setTimeout(() => {
      document.querySelectorAll(".signal-bar-fill").forEach(el => {
        el.style.width = el.dataset.target + "%";
      });
    }, 300);

    // ── Explanations ──────────────────────────────────────────
    const expList = document.getElementById("explanation-list");
    (data.explanation || []).forEach(text => {
      const item = document.createElement("div");
      item.className = "explanation-item";
      item.textContent = text;
      expList.appendChild(item);
    });
  }

  function renderGallery(type) {
    const gallery = document.getElementById("spectro-gallery");
    gallery.innerHTML = "";
    const labels = {
      human:  ["Sample 1","Sample 2","Sample 3","Sample 4","Sample 5"],
      ai:     ["ElevenLabs","OpenAI TTS","Google WaveNet","Azure Neural","ByteDance"],
      hybrid: ["Hybrid A","Hybrid B","Hybrid C","Hybrid D","Hybrid E"],
    };
    const seeds = { human: [2,7,13,19,29], ai: [3,8,14,20,31], hybrid: [5,11,17,23,37] };

    labels[type].forEach((label, i) => {
      const wrap   = document.createElement("div");
      wrap.className = "spectro-mini-wrap";
      const canvas = document.createElement("canvas");
      canvas.className = "spectro-mini";
      canvas.width  = 150;
      canvas.height = 70;
      wrap.appendChild(canvas);
      const lbl = document.createElement("div");
      lbl.className = "spectro-mini-label";
      lbl.textContent = label;
      wrap.appendChild(lbl);
      gallery.appendChild(wrap);

      // Draw after appended so offsetWidth works
      setTimeout(() => {
        drawSpectrogram(canvas, type, seeds[type][i]);
      }, i * 40);
    });
  }

  function showError(msg) {
    document.getElementById("loading-state").style.display = "none";
    document.getElementById("error-state").style.display   = "block";
    document.getElementById("error-msg").textContent       = msg;
  }
  </script>
</body>
</html>
